<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReHash Local Preview</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #eaf3ff 0%, #f8fbff 45%, #eef7f1 100%);
        font-family: "Segoe UI", Arial, sans-serif;
      }

      .preview-shell {
        width: min(100%, 440px);
        padding: 24px;
      }

      .preview-note {
        margin-bottom: 12px;
        color: #35516b;
        font-size: 14px;
        line-height: 1.5;
      }

      iframe {
        width: 100%;
        height: 700px;
        border: 1px solid #c8d9ea;
        border-radius: 18px;
        background: #ffffff;
        box-shadow: 0 18px 45px rgba(28, 54, 86, 0.14);
      }
    </style>
  </head>
  <body>
    <div class="preview-shell">
      <p class="preview-note">
        This local preview injects a mock Chrome API so the popup can run in a normal browser tab.
        Use it for UI smoke checks. For real extension behavior, still load the unpacked bundle in Chrome.
      </p>
      <iframe src="/local/popup-runtime.html" title="ReHash popup local preview"></iframe>
    </div>
  </body>
</html>
